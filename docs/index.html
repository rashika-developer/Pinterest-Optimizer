<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Optimizer | AI-Powered Creator Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .logo {
            background-color: #E60023;
            color: white;
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            font-size: 48px;
            font-weight: 800;
            margin: 0 auto 24px;
        }
        h1 { font-size: 32px; margin-bottom: 16px; }
        p { color: #767676; line-height: 1.6; margin-bottom: 32px; }
        .btn {
            display: inline-block;
            background-color: #E60023;
            color: white;
            padding: 16px 32px;
            border-radius: 28px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .footer { margin-top: 40px; font-size: 12px; color: #adadad; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">P</div>
        <h1>Account Linked!</h1>
        <p>Your Pinterest account is ready to be used with the <b>Optimizer App</b>. You can now close this window or tap below to return to the app and start creating.</p>

        <a href="pinto://oauth" class="btn">Open Pinterest Optimizer</a>

        <div class="footer">
            Developed by rashika-developer &bull; Powered by Pinterest API
        </div>
    </div>

    <script>
        // Logic to handle OAuth code from Pinterest
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
            // Automatically try to redirect to the app with the code
            window.location.href = "pinto://oauth?code=" + code;
        }
    </script>
</body>
</html>
